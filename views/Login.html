<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Agro ERP</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">

    <div class="left-side">
        <div>
            <h1>🌿 Agro ERP</h1>
            <p>Système de gestion agricole professionnel</p>
        </div>
    </div>

    <div class="right-side">

        <div class="tabs">
            <button id="loginTab" class="active" type="button">Login</button>
            <button id="registerTab" type="button">Register</button>
        </div>

        <!-- Login -->
        <form id="loginForm" action="/login" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="submit-btn">Connexion</button>
        </form>

        <!-- Register -->
        <form id="registerForm" action="/register" method="POST" style="display:none;">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <select name="role">
                <option value="admin">Admin</option>
                <option value="employee">Employee</option>
                <option value="moderator">Moderator</option>
            </select>

            <button type="submit" class="submit-btn">Register</button>
        </form>

    </div>

</div>

<script>
const loginBtn = document.getElementById("loginTab");
const registerBtn = document.getElementById("registerTab");
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

loginBtn.onclick = () => {
    loginForm.style.display = "block";
    registerForm.style.display = "none";
    loginBtn.classList.add("active");
    registerBtn.classList.remove("active");
};

registerBtn.onclick = () => {
    loginForm.style.display = "none";
    registerForm.style.display = "block";
    registerBtn.classList.add("active");
    loginBtn.classList.remove("active");
};
</script>

</body>
</html>
